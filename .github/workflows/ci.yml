name: ci

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      - name: Format check
        run: npm run format:check
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Content validation
        run: npm run content:validate
      - name: Routes validation
        run: npm run routes:validate
      - name: SEO artifacts validation
        run: npm run seo:validate
      - name: Assets verification
        run: npm run assets:verify
      - name: Unit tests
        run: npm run test:run
      - name: Build
        run: npm run build
      - name: Bundle budget
        run: npm run bundle:budget
      - name: Build production release
        run: npm run release:build
      - name: Verify production release
        env:
          EXPECTED_RELEASE_SHA256: 2af70b562330575a42443191e4a8a3cd99804c65f37a4133bd727437b5984e67
        run: npm run release:verify
      - name: Dependency audit
        run: npm audit --audit-level=high

  e2e:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      - name: Build production application
        run: npm run build
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: E2E
        run: npm run test:e2e
      - name: Production Axe audit
        run: npm run accessibility:axe
      - name: Upload E2E diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-diagnostics
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore

  lighthouse:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      - name: Build production application
        run: npm run build
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Configure Chromium for Lighthouse
        shell: bash
        run: |
          chromium_path="$(node -e 'const { chromium } = require("@playwright/test"); process.stdout.write(chromium.executablePath())')"
          echo "CHROME_PATH=$chromium_path" >> "$GITHUB_ENV"
      - name: Lighthouse CI
        run: npm run lighthouse:ci
      - name: Upload Lighthouse diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-diagnostics
          path: .tmp-lighthouse/
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 14
