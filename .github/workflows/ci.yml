name: ci

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      - name: Format check
        run: npm run format:check
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Content validation
        run: npm run content:validate
      - name: Routes validation
        run: npm run routes:validate
      - name: SEO artifacts validation
        run: npm run seo:validate
      - name: Assets verification
        run: npm run assets:verify
      - name: Unit tests
        run: npm run test:run
      - name: Build
        run: npm run build
      - name: Bundle budget
        run: npm run bundle:budget
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - name: Configure Chromium for Lighthouse
        shell: bash
        run: echo "CHROME_PATH=$(node -e \"const { chromium } = require('@playwright/test'); process.stdout.write(chromium.executablePath())\")" >> "$GITHUB_ENV"
      - name: Lighthouse CI
        run: npm run lighthouse:ci
      - name: E2E
        run: npm run test:e2e
